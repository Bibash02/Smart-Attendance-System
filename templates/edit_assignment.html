{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Assignment</title>
    <link rel="stylesheet" href="{% static 'css/teacher.css' %}">

    <style>
        .form-container {
            max-width: 700px;
            margin: 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .submit-btn {
            background: #4f46e5;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .back-btn {
            text-decoration: none;
            background: #f1f5f9;
            padding: 8px 14px;
            border-radius: 8px;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <main class="main-content">

        <!-- Header -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h2>✏ Edit Assignment</h2>
                <p style="color:gray;">Update your assignment details</p>
            </div>

            <a href="{% url 'teacher_dashboard' %}" class="back-btn">
                ← Back
            </a>
        </div>

        <!-- Form -->
        <div class="form-container">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group">
                    <label>Class Group</label>
                    {{ form.class_group }}
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    {{ form.subject }}
                </div>

                <div class="form-group">
                    <label>Title</label>
                    {{ form.title }}
                </div>

                <div class="form-group">
                    <label>Description</label>
                    {{ form.description }}
                </div>

                <div class="form-group">
                    <label>Due Date</label>
                    {{ form.due_date }}
                </div>

                <div class="form-group">
                    <label>Update File</label>
                    {{ form.file }}
                </div>

                <button type="submit" class="submit-btn">
                    💾 Update Assignment
                </button>
            </form>
        </div>

    </main>
</div>

</body>
</html>
