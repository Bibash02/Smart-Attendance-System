{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Assignment</title>
    <link rel="stylesheet" href="{% static 'css/teacher.css' %}">

    <style>
        .form-container {
            max-width: 700px;
            margin: 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #444;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #4f46e5;
            outline: none;
            box-shadow: 0 0 0 2px rgba(79,70,229,0.1);
        }

        .submit-btn {
            background: #4f46e5;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>

<div class="container">
    <main class="main-content">

        <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
            
            <div>
                <h2>Add Assignment 📄</h2>
                <p style="color: gray;">Create and assign tasks to your class</p>
            </div>

            <a href="{% url 'teacher_dashboard' %}" class="back-btn">
                ← Back
            </a>

        </div>

        <div class="form-container">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group">
                    <label>Select Class Group</label>
                    {{ form.class_group }}
                </div>

                <div class="form-group">
                    <label>Select Subject</label>
                    {{ form.subject }}
                </div>

                <div class="form-group">
                    <label>Assignment Title</label>
                    {{ form.title }}
                </div>

                <div class="form-group">
                    <label>Description</label>
                    {{ form.description }}
                </div>

                <div class="form-group">
                    <label>Due Date</label>
                    {{ form.due_date }}
                </div>

                <div class="form-group">
                    <label>Upload File (Optional)</label>
                    {{ form.file }}
                </div>

                <button type="submit" class="submit-btn">
                    Submit Assignment
                </button>
            </form>
        </div>

    </main>
</div>

</body>
</html>
